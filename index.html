<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inovaSys - Gestão Arbitral</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --color-primary: #0a192f;
            --color-accent: #0284c7;
            --color-bg: #f8fafc;
            --sidebar-width: 260px;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--color-bg); color: #334155; margin: 0; display: flex; min-height: 100vh; }
        .module { display: none; width: 100%; }
        .module.active { display: flex; }
        .view { display: none; }
        .view.active { display: block; }

        /* Login */
        #module-auth { height: 100vh; justify-content: center; align-items: center; background: #ffffff; width: 100%; }
        .auth-card { background: white; padding: 40px; border-radius: 12px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; color: var(--color-primary); }
        .form-control { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        .btn { padding: 12px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; width: 100%; background: var(--color-accent); color: white; transition: 0.2s; }
        .btn-outline { background: transparent; border: 1px solid #e2e8f0; color: #334155; margin-bottom: 10px; }
        .btn-outline:hover { background: #f8fafc; }
        .btn-link { background: none; color: var(--color-accent); font-size: 13px; margin-top: 15px; text-decoration: underline; padding: 0; width: auto; cursor: pointer; }
        
        /* Sidebar & App */
        .sidebar { width: var(--sidebar-width); background: white; border-right: 1px solid #e2e8f0; position: fixed; height: 100vh; display: flex; flex-direction: column; z-index: 10; }
        .sidebar-brand { padding: 25px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .nav-item { padding: 15px 25px; cursor: pointer; font-size: 14px; font-weight: 500; color: #64748b; border-left: 4px solid transparent; }
        .nav-item.active { background: #f1f5f9; color: var(--color-accent); border-left-color: var(--color-accent); }
        .main { flex: 1; margin-left: var(--sidebar-width); padding: 40px; }

        .card { background: white; border-radius: 8px; border: 1px solid #e2e8f0; padding: 25px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; font-size: 11px; text-transform: uppercase; color: #64748b; background: #f8fafc; }
        td { padding: 12px; border-top: 1px solid #e2e8f0; font-size: 14px; }
        
        #error-box { display: none; background: #fee2e2; color: #b91c1c; padding: 12px; border-radius: 6px; font-size: 13px; margin-bottom: 20px; text-align: left; border: 1px solid #fecaca; }
        .auth-view { display: none; }
        .auth-view.active { display: block; }

        /* Grid Layout para o formulário */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    </style>
</head>
<body>

    <div id="module-auth" class="module active">
        <div class="auth-card">
            <img src="logo-inovasys.png" alt="inovaSys" style="max-width: 160px; margin-bottom: 25px;">
            <div id="error-box"></div>
            
            <div id="view-login" class="auth-view active">
                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label">E-mail de Acesso</label>
                        <input type="email" id="email" class="form-control" autocomplete="username" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Senha</label>
                        <input type="password" id="password" class="form-control" autocomplete="current-password" required>
                    </div>
                    <button type="submit" id="btn-login" class="btn">Autenticar</button>
                </form>
                <button type="button" class="btn btn-link" id="btn-to-forgot">Esqueci minha senha</button>
            </div>

            <div id="view-forgot" class="auth-view">
                <h3 style="margin-top:0;">Recuperar Acesso</h3>
                <form id="forgot-form">
                    <div class="form-group"><label class="form-label">E-mail</label><input type="email" id="forgot-email" class="form-control" required></div>
                    <button type="submit" id="btn-forgot" class="btn">Enviar Link</button>
                </form>
                <button type="button" class="btn btn-link" id="btn-to-login">Voltar</button>
            </div>

            <div id="view-new-password" class="auth-view">
                <h3>Nova Senha</h3>
                <form id="new-password-form">
                    <input type="text" style="display:none;" autocomplete="username">
                    <div class="form-group"><label class="form-label">Senha</label><input type="password" id="new-pwd" class="form-control" minlength="6" required></div>
                    <button type="submit" id="btn-new-pwd" class="btn">Salvar</button>
                </form>
            </div>
        </div>
    </div>

    <div id="module-app" class="module">
        <nav class="sidebar">
            <div class="sidebar-brand"><img src="logo-inovasys.png" alt="inovaSys" style="max-width: 130px;"></div>
            <div class="nav-item active" id="nav-dash">Processos</div>
            <div class="nav-item" id="nav-novo">Novo Protocolo</div>
            <div class="nav-item" id="nav-logout" style="margin-top:auto; color: #ef4444;">Sair</div>
        </nav>
        <main class="main">
            <div id="view-dash" class="view active">
                <h2>Processos Arbitrais</h2>
                <div class="card">
                    <table>
                        <thead><tr><th>Nº do Processo</th><th>Requerido</th><th>Status</th></tr></thead>
                        <tbody id="lista-processos"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-novo" class="view">
                <h2>Novo Protocolo</h2>
                <div class="card">
                    <form id="processo-form">
                        <h4 style="margin-top:0;">Dados do Requerente</h4>
                        <div class="form-grid">
                            <div class="form-group"><label class="form-label">Nome Completo</label><input type="text" id="req_nome" class="form-control" required></div>
                            <div class="form-group"><label class="form-label">CPF/CNPJ</label><input type="text" id="req_doc" class="form-control" required></div>
                        </div>

                        <h4>Dados do Requerido</h4>
                        <div class="form-grid">
                            <div class="form-group"><label class="form-label">Nome Completo</label><input type="text" id="def_nome" class="form-control" required></div>
                            <div class="form-group"><label class="form-label">CPF/CNPJ</label><input type="text" id="def_doc" class="form-control" required></div>
                        </div>

                        <h4>Objeto do Litígio</h4>
                        <div class="form-group"><label class="form-label">Resumo dos Fatos</label><textarea id="fatos" class="form-control" rows="4"></textarea></div>
                        
                        <button type="submit" id="btn-protocolar" class="btn" style="width: auto;">Cadastrar Processo</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/+esm';

        const SUPABASE_URL = 'https://tsgbvhfdceyjbyfstjol.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzZ2J2aGZkY2V5amJ5ZnN0am9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjY3MDEsImV4cCI6MjA5MDA0MjcwMX0.ucDetUUuVKyycACaNtzArQ8YpgybrRpQqYljYYiTgyI';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        const displayError = (msg) => {
            const box = document.getElementById('error-box');
            if (box) { box.innerText = msg; box.style.display = msg ? 'block' : 'none'; }
        };

        const showAuthView = (viewId) => {
            document.querySelectorAll('.auth-view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        };

        const showAppView = (viewId) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            document.getElementById('nav-' + viewId).classList.add('active');
        };

        const toggleMainModules = (isAuthenticated) => {
            document.getElementById('module-auth').classList.toggle('active', !isAuthenticated);
            document.getElementById('module-app').classList.toggle('active', isAuthenticated);
            if (isAuthenticated) loadData();
        };

        const loadData = async () => {
            const { data, error } = await supabase.from('processos').select('*');
            const lista = document.getElementById('lista-processos');
            if (error) {
                lista.innerHTML = `<tr><td colspan="3">Erro: ${error.message}</td></tr>`;
                return;
            }
            lista.innerHTML = data.length > 0 ? data.map(p => `<tr><td><strong>${p.numero_processo}</strong></td><td>${p.requerido_nome}</td><td>${p.status || 'Ativo'}</td></tr>`).join('') : '<tr><td colspan="3">Nenhum registro.</td></tr>';
        };

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const { error } = await supabase.auth.signInWithPassword({ email: e.target.email.value, password: e.target.password.value });
            if (error) displayError('Erro: ' + error.message);
        };

        document.getElementById('nav-dash').onclick = () => showAppView('dash');
        document.getElementById('nav-novo').onclick = () => showAppView('novo');
        document.getElementById('nav-logout').onclick = async () => { await supabase.auth.signOut(); window.location.reload(); };

        // Cadastro com os NOVOS CAMPOS
        document.getElementById('processo-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-protocolar');
            btn.innerText = "Processando...";
            btn.disabled = true;

            const { data: { user } } = await supabase.auth.getUser();
            
            const payload = {
                numero_processo: `${new Date().getFullYear()}.AR.${Math.floor(Math.random()*9000 + 1000)}`,
                requerente_nome: document.getElementById('req_nome').value,
                requerente_doc: document.getElementById('req_doc').value,
                requerido_nome: document.getElementById('def_nome').value,
                requerido_doc: document.getElementById('def_doc').value,
                resumo_fatos: document.getElementById('fatos').value,
                user_id: user.id,
                status: 'Ativo'
            };

            const { error } = await supabase.from('processos').insert([payload]);
            
            btn.innerText = "Cadastrar Processo";
            btn.disabled = false;

            if (error) {
                alert('Erro ao protocolar: ' + error.message);
            } else {
                alert('Processo protocolado!');
                document.getElementById('processo-form').reset();
                showAppView('dash');
                loadData();
            }
        };

        supabase.auth.onAuthStateChange((event, session) => {
            toggleMainModules(!!session);
        });

        supabase.auth.getSession().then(({ data: { session } }) => {
            toggleMainModules(!!session);
        });
    </script>
</body>
</html>
