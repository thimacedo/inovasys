<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inovaSys - Gestão Arbitral</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --color-primary: #0a192f;
            --color-accent: #0284c7;
            --color-bg: #f8fafc;
            --sidebar-width: 260px;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--color-bg); color: #334155; margin: 0; display: flex; min-height: 100vh; }
        .module { display: none; width: 100%; }
        .module.active { display: flex; }
        .view { display: none; }
        .view.active { display: block; }

        /* Login */
        #module-auth { height: 100vh; justify-content: center; align-items: center; background: #ffffff; width: 100%; }
        .auth-card { background: white; padding: 40px; border-radius: 12px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; color: var(--color-primary); }
        .form-control { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        .btn { padding: 12px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; width: 100%; background: var(--color-accent); color: white; transition: 0.2s; }
        .btn-outline { background: transparent; border: 1px solid #e2e8f0; color: #334155; margin-bottom: 10px; }
        .btn-outline:hover { background: #f8fafc; }
        .btn-link { background: none; color: var(--color-accent); font-size: 13px; margin-top: 15px; text-decoration: underline; padding: 0; width: auto; }
        
        /* Divisor OAuth */
        .oauth-divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: #94a3b8; font-size: 12px; }
        .oauth-divider::before, .oauth-divider::after { content: ''; flex: 1; border-bottom: 1px solid #e2e8f0; }
        .oauth-divider span { padding: 0 10px; }

        /* Sidebar & App */
        .sidebar { width: var(--sidebar-width); background: white; border-right: 1px solid #e2e8f0; position: fixed; height: 100vh; display: flex; flex-direction: column; z-index: 10; }
        .sidebar-brand { padding: 25px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .nav-item { padding: 15px 25px; cursor: pointer; font-size: 14px; font-weight: 500; color: #64748b; border-left: 4px solid transparent; }
        .nav-item.active { background: #f1f5f9; color: var(--color-accent); border-left-color: var(--color-accent); }
        .main { flex: 1; margin-left: var(--sidebar-width); padding: 40px; }

        .card { background: white; border-radius: 8px; border: 1px solid #e2e8f0; padding: 25px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; font-size: 11px; text-transform: uppercase; color: #64748b; background: #f8fafc; }
        td { padding: 12px; border-top: 1px solid #e2e8f0; font-size: 14px; }
        
        #error-box { display: none; background: #fee2e2; color: #b91c1c; padding: 12px; border-radius: 6px; font-size: 13px; margin-bottom: 20px; text-align: left; border: 1px solid #fecaca; }
        
        .auth-view { display: none; }
        .auth-view.active { display: block; }
    </style>
</head>
<body>

    <div id="module-auth" class="module active">
        <div class="auth-card">
            <img src="logo-inovasys.png" alt="inovaSys" style="max-width: 160px; margin-bottom: 25px;">
            <div id="error-box"></div>
            
            <div id="view-login" class="auth-view active">
                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label">E-mail de Acesso</label>
                        <input type="email" id="email" class="form-control" autocomplete="username" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Senha</label>
                        <input type="password" id="password" class="form-control" autocomplete="current-password" required>
                    </div>
                    <button type="submit" id="btn-login" class="btn">Autenticar</button>
                </form>

                <div class="oauth-divider"><span>ou acesse com</span></div>
                
                <button type="button" class="btn btn-outline" onclick="loginWithProvider('google')">Google</button>
                <button type="button" class="btn btn-outline" onclick="loginWithProvider('apple')">Apple</button>
                <button type="button" class="btn btn-outline" onclick="loginWithProvider('github')">GitHub</button>

                <button type="button" class="btn btn-link" onclick="switchAuthView('view-forgot')">Esqueci minha senha</button>
            </div>

            <div id="view-forgot" class="auth-view">
                <h3 style="margin-top:0; color: var(--color-primary);">Recuperar Acesso</h3>
                <form id="forgot-form">
                    <div class="form-group"><label class="form-label">E-mail Cadastrado</label><input type="email" id="forgot-email" class="form-control" required></div>
                    <button type="submit" id="btn-forgot" class="btn">Enviar Link</button>
                </form>
                <button type="button" class="btn btn-link" onclick="switchAuthView('view-login')">Voltar ao login</button>
            </div>

            <div id="view-new-password" class="auth-view">
                <h3 style="margin-top:0; color: var(--color-primary);">Nova Senha</h3>
                <form id="new-password-form">
                    <!-- Campo oculto de username para acessibilidade e autocomplete -->
                    <input type="text" id="username-hidden" style="display:none;" autocomplete="username" aria-hidden="true">
                    <div class="form-group"><label class="form-label">Nova Senha</label><input type="password" id="new-pwd" class="form-control" autocomplete="new-password" minlength="6" required></div>
                    <button type="submit" id="btn-new-pwd" class="btn">Salvar Senha</button>
                </form>
            </div>
        </div>
    </div>

    <div id="module-app" class="module">
        <nav class="sidebar">
            <div class="sidebar-brand"><img src="logo-inovasys.png" alt="inovaSys" style="max-width: 130px;"></div>
            <div class="nav-item active" onclick="showView('dash', this)">Processos</div>
            <div class="nav-item" onclick="showView('novo', this)">Novo Protocolo</div>
            <div class="nav-item" onclick="logout()" style="margin-top:auto; color: #ef4444;">Sair</div>
        </nav>
        <main class="main">
            <div id="view-dash" class="view active">
                <h2>Processos Arbitrais</h2>
                <div class="card">
                    <table>
                        <thead><tr><th>Nº do Processo</th><th>Requerido</th><th>Status</th></tr></thead>
                        <tbody id="lista-processos"></tbody>
                    </table>
                </div>
            </div>
            <div id="view-novo" class="view">
                <h2>Novo Protocolo</h2>
                <div class="card">
                    <form id="processo-form">
                        <div class="form-group"><label class="form-label">Requerente</label><input type="text" id="req_nome" class="form-control" required></div>
                        <div class="form-group"><label class="form-label">Requerido</label><input type="text" id="def_nome" class="form-control" required></div>
                        <button type="submit" id="btn-protocolar" class="btn" style="width: auto;">Cadastrar Processo</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Handler global para erros não capturados
        window.addEventListener('error', (e) => {
            console.error('[GLOBAL ERROR]', e.message);
        });
        
        // Suprimir erros de extensões do Chrome
        window.addEventListener('unhandledrejection', (event) => {
            if (event.reason && event.reason.message && event.reason.message.includes('message port')) {
                console.warn('[EXTENSÃO] Ignorando erro de message port de extensão:', event.reason.message);
                event.preventDefault();
            }
        });
        
        const SUPABASE_URL = 'https://tsgbvhfdceyjbyfstjol.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzZ2J2aGZkY2V5amJ5ZnN0am9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjY3MDEsImV4cCI6MjA5MDA0MjcwMX0.ucDetUUuVKyycACaNtzArQ8YpgybrRpQqYljYYiTgyI';
        
        let supabase = null;
        
        // Inicializar Supabase e verificar conexão
        function initSupabase() {
            if (!window.supabase) {
                console.error('[ERRO] Biblioteca Supabase não foi carregada do CDN');
                showError('Erro ao carregar biblioteca de autenticação. Tente recarregar a página.');
                return false;
            }
            
            try {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                console.log('[OK] Cliente Supabase inicializado');
                return true;
            } catch (err) {
                console.error('[ERRO] Falha ao criar cliente Supabase:', err);
                showError('Erro ao inicializar conexão: ' + err.message);
                return false;
            }
        }
        
        // Tentar inicializar imediatamente
        if (!initSupabase()) {
            document.addEventListener('load', initSupabase);
        }

        function showError(msg) {
            const box = document.getElementById('error-box');
            box.innerText = msg;
            box.style.display = msg ? 'block' : 'none';
        }

        function switchAuthView(viewId) {
            document.querySelectorAll('.auth-view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            showError('');
        }

        function showView(v, element) { 
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active')); 
            document.getElementById('view-'+v).classList.add('active'); 
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(element) element.classList.add('active');
        }

        // Login Email/Senha
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            showError('');
            
            if (!supabase) {
                showError('Sistema não está pronto. Tente recarregar a página.');
                console.error('[ERRO] Supabase não foi inicializado');
                return;
            }
            
            const btn = document.getElementById('btn-login');
            const email = e.target.email.value;
            const password = e.target.password.value;
            
            btn.innerText = "Conectando...";
            btn.disabled = true;
            console.log(`[LOGIN] Tentando autenticar: ${email}`);

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    console.error('[ERRO LOGIN]', error);
                    let mensagem = error.message;
                    
                    // Mensagens mais amigáveis
                    if (error.message.includes('Invalid login credentials')) 
                        mensagem = 'E-mail ou senha inválidos';
                    else if (error.message.includes('User not found'))
                        mensagem = 'Usuário não encontrado';
                    else if (error.message.includes('network'))
                        mensagem = 'Erro de conexão - verifique sua internet';
                    else if (error.message.includes('CORS'))
                        mensagem = 'Erro de CORS - contate o administrador';
                    
                    showError('❌ ' + mensagem);
                    btn.innerText = "Autenticar";
                    btn.disabled = false;
                } else {
                    console.log('[OK] Login bem-sucedido:', data.user?.email);
                    await loadData();
                }
            } catch (err) {
                console.error('[ERRO CONEXÃO]', err);
                showError('❌ Erro de conexão: ' + err.message);
                btn.innerText = "Autenticar";
                btn.disabled = false;
            }
        };

        // Login OAuth (Google, Apple, GitHub)
        async function loginWithProvider(provider) {
            showError('');
            try {
                const { error } = await supabase.auth.signInWithOAuth({
                    provider: provider,
                    options: {
                        redirectTo: window.location.origin
                    }
                });
                if (error) showError("Erro ao conectar com " + provider + ": " + error.message);
            } catch (err) {
                showError("Erro na conexão com o provedor.");
            }
        }

        // Esqueci Senha
        document.getElementById('forgot-form').onsubmit = async (e) => {
            e.preventDefault();
            if (!supabase) {
                showError('Sistema não está pronto');
                return;
            }
            console.log('[FORGOT] Enviando link de recuperação');
            const { error } = await supabase.auth.resetPasswordForEmail(e.target['forgot-email'].value, {
                redirectTo: window.location.origin
            });
            if (error) {
                console.error('[ERRO FORGOT]', error);
                showError('Erro: ' + error.message);
            } else {
                alert("Link enviado ao e-mail!");
                switchAuthView('view-login');
            }
        };

        // Nova Senha
        document.getElementById('new-password-form').onsubmit = async (e) => {
            e.preventDefault();
            if (!supabase) {
                showError('Sistema não está pronto');
                return;
            }
            console.log('[NEW PWD] Atualizando senha');
            const { error } = await supabase.auth.updateUser({ password: e.target['new-pwd'].value });
            if (error) {
                console.error('[ERRO NEW PWD]', error);
                showError('Erro: ' + error.message);
            } else { 
                alert("Senha atualizada com sucesso!"); 
                location.reload(); 
            }
        };

        if (supabase) {
            supabase.auth.onAuthStateChange((event) => {
                console.log('[AUTH EVENT]', event);
                if (event === "PASSWORD_RECOVERY") switchAuthView('view-new-password');
            });
        }

        // Carregar Dados
        async function loadData() {
            try {
                if (!supabase) {
                    console.error('[ERRO] Supabase não inicializado');
                    showError('Erro: Sistema não está pronto');
                    return;
                }
                
                console.log('[LOAD] Verificando sessão...');
                const { data: { session }, error: sessionError } = await supabase.auth.getSession();
                
                if (sessionError) {
                    console.error('[ERRO SESSÃO]', sessionError);
                    showError('Erro ao verificar sessão: ' + sessionError.message);
                    return;
                }
                
                if (!session) {
                    console.log('[INFO] Sem sessão ativa');
                    return;
                }
                
                console.log('[OK] Sessão ativa para:', session.user.email);
                
                document.getElementById('module-auth').classList.remove('active');
                document.getElementById('module-app').classList.add('active');
                
                console.log('[LOAD] Buscando processos...');
                const { data, error } = await supabase.from('processos').select('*');
                const lista = document.getElementById('lista-processos');
                
                if (error) {
                    console.error('[ERRO TABELA]', error);
                    let msg = error.message;
                    if (error.code === '42P01') 
                        msg = 'Tabela "processos" não existe no banco de dados';
                    else if (error.message.includes('permission denied'))
                        msg = 'Sem permissão para acessar a tabela "processos"';
                    
                    lista.innerHTML = `<tr><td colspan="3" style="text-align:center; color:red;">Erro: ${msg}</td></tr>`;
                    console.error('[ERRO COMPLETO]', JSON.stringify(error));
                } else if (data && data.length > 0) {
                    console.log('[OK] Carregados', data.length, 'processos');
                    lista.innerHTML = data.map(p => `<tr><td><strong>${p.numero_processo}</strong></td><td>${p.requerido_nome}</td><td><span style="background:#e0f2fe; color:#0369a1; padding:4px 8px; border-radius:4px; font-size:12px;">${p.status || 'Ativo'}</span></td></tr>`).join('');
                } else {
                    lista.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#64748b;">Nenhum registro encontrado.</td></tr>';
                }
            } catch (err) {
                console.error('[ERRO LOAD]', err);
                showError('Erro ao carregar dados: ' + err.message);
            }
        }

        async function logout() { 
            if (!supabase) {
                location.reload();
                return;
            }
            try {
                await supabase.auth.signOut(); 
            } catch (err) {
                console.error('[ERRO LOGOUT]', err);
            }
            location.reload(); 
        }

        // Novo Processo
        document.getElementById('processo-form').onsubmit = async (e) => {
            e.preventDefault();
            if (!supabase) {
                alert('Erro: Sistema não está pronto');
                return;
            }
            
            try {
                const { data: { user }, error: userError } = await supabase.auth.getUser();
                if (userError || !user) {
                    console.error('[ERRO] Falha ao obter usuário:', userError);
                    alert('Erro: Falha ao identificar usuário');
                    return;
                }
                
                const payload = {
                    numero_processo: `${new Date().getFullYear()}.AR.${Math.floor(Math.random()*9000 + 1000)}`,
                    requerente_nome: document.getElementById('req_nome').value,
                    requerido_nome: document.getElementById('def_nome').value,
                    user_id: user.id,
                    status: 'Ativo'
                };
                
                console.log('[NOVO PROCESSO] Inserindo:', payload);
                const { error } = await supabase.from('processos').insert([payload]);
                
                if (error) {
                    console.error('[ERRO INSERT]', error);
                    alert("Erro ao cadastrar: " + error.message); 
                } else { 
                    alert('Cadastrado com sucesso!'); 
                    document.getElementById('processo-form').reset(); 
                    showView('dash', document.querySelector('.nav-item'));
                    await loadData(); 
                }
            } catch (err) {
                console.error('[ERRO PROCESSO]', err);
                alert('Erro: ' + err.message);
            }
        };

        // Inicializar na carga do documento
        document.addEventListener('DOMContentLoaded', () => {
            console.log('[INIT] Documento carregado');
            if (!supabase) initSupabase();
            loadData();
        });
        
        // Se o documento já está pronto
        if (document.readyState === 'interactive' || document.readyState === 'complete') {
            console.log('[INIT] Documento já está pronto');
            loadData();
        }
    </script>
</body>
</html>
