<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title class="sys-name">inovaSys - Gestão Arbitral</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --color-primary: #0a192f; --color-accent: #0284c7; --color-bg: #f8fafc; --sidebar-width: 260px; }
        body { font-family: 'Inter', sans-serif; background-color: var(--color-bg); color: #334155; margin: 0; display: flex; min-height: 100vh; }
        .module { display: none; width: 100%; }
        .module.active { display: flex; }
        .view { display: none; }
        .view.active { display: block; }
        .sidebar { width: var(--sidebar-width); background: white; border-right: 1px solid #e2e8f0; position: fixed; height: 100vh; display: flex; flex-direction: column; z-index: 10; }
        .sidebar-brand { padding: 25px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .sidebar-brand img { max-width: 120px; max-height: 60px; object-fit: contain; }
        .nav-item { padding: 15px 25px; cursor: pointer; font-size: 14px; font-weight: 500; color: #64748b; border-left: 4px solid transparent; }
        .nav-item.active { background: #f1f5f9; color: var(--color-accent); border-left-color: var(--color-accent); }
        .main { flex: 1; margin-left: var(--sidebar-width); padding: 40px; }
        .card { background: white; border-radius: 8px; border: 1px solid #e2e8f0; padding: 25px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; font-size: 11px; text-transform: uppercase; color: #64748b; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; font-size: 14px; margin-top: 5px; }
        .form-label { font-size: 12px; font-weight: 600; color: var(--color-primary); }
        .btn { padding: 10px 18px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; color: white; font-size: 13px; }
        .btn-primary { background: var(--color-accent); }
        .btn-success { background: #10b981; }
        .btn-secondary { background: #64748b; }
        .btn-danger { background: #ef4444; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .badge-status { background: #e0e7ff; color: #3730a3; }
        .tab-menu { display: flex; gap: 15px; border-bottom: 1px solid #eee; margin-bottom: 20px; }
        .tab-link { cursor: pointer; font-weight: 600; font-size: 14px; color: #64748b; padding-bottom: 10px; }
        .tab-link.active { color: var(--color-accent); border-bottom: 2px solid var(--color-accent); }
        .toast { position: fixed; bottom: 30px; right: 30px; background: #1e293b; color: white; padding: 15px 20px; border-radius: 8px; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 9999; }
        .toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        #modal-preview { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 800px; height: 85vh; border-radius: 12px; display: flex; flex-direction: column; }
        .modal-body { flex: 1; overflow-y: auto; padding: 40px; background: #f1f5f9; }
        .pdf-page { background: white; width: 100%; padding: 60px; box-sizing: border-box; font-family: 'Times New Roman', serif; line-height: 1.6; }
        .editable-field { border-bottom: 1px dashed var(--color-accent); outline: none; }
    </style>
</head>
<body>

    <div id="module-auth" class="module active" style="height: 100vh; justify-content: center; align-items: center;">
        <div style="background: white; padding: 40px; border-radius: 12px; width: 100%; max-width: 380px; text-align: center; border: 1px solid #e2e8f0;">
            <img src="logo-inovasys.png" class="sys-logo" style="max-width: 160px; margin-bottom: 25px;">
            <h2 class="sys-name">inovaSys</h2>
            <form id="login-form">
                <div style="text-align:left; margin-bottom:15px;"><label class="form-label">E-mail</label><input type="email" id="email" class="form-control" required></div>
                <div style="text-align:left; margin-bottom:15px;"><label class="form-label">Senha</label><input type="password" id="password" class="form-control" required></div>
                <button type="submit" class="btn btn-primary" style="width:100%;" id="btn-login">Acessar Painel</button>
            </form>
        </div>
    </div>

    <div id="module-app" class="module">
        <nav class="sidebar">
            <div class="sidebar-brand"><img src="logo-inovasys.png" class="sys-logo"><h3 class="sys-name">inovaSys</h3></div>
            <div class="nav-item active" onclick="showView('dash')">Painel e Processos</div>
            <div class="nav-item" onclick="showView('novo')">Novo Protocolo</div>
            <div class="nav-item" onclick="showView('arbitros')">Corpo Arbitral</div>
            <div class="nav-item" onclick="supabase.auth.signOut()" style="margin-top:auto; color: #ef4444;">Sair</div>
        </nav>

        <main class="main">
            <div id="view-dash" class="view active">
                <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>Painel de Controle</h2>
                    <input type="text" id="search-input" class="form-control" style="width: 250px;" placeholder="Pesquisar...">
                </div>
                <div class="card">
                    <table>
                        <thead><tr><th>Nº Processo</th><th>Requerente</th><th>Requerido</th><th>Status</th><th>Ação</th></tr></thead>
                        <tbody id="lista-processos"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-novo" class="view">
                <h2>Novo Protocolo</h2>
                <form id="processo-form">
                    <div class="card">
                        <h4>Dados do Requerente</h4>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                            <input type="text" id="req_nome" class="form-control" placeholder="Nome" required>
                            <input type="text" id="req_doc" class="form-control" placeholder="CPF/CNPJ" required>
                        </div>
                        <input type="text" id="req_end" class="form-control" placeholder="Endereço Completo" required style="margin-top:10px;">
                    </div>
                    <div class="card">
                        <h4>Dados do Requerido</h4>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                            <input type="text" id="def_nome" class="form-control" placeholder="Nome" required>
                            <input type="text" id="def_doc" class="form-control" placeholder="CPF/CNPJ" required>
                        </div>
                        <input type="text" id="def_end" class="form-control" placeholder="Endereço Completo" required style="margin-top:10px;">
                    </div>
                    <div class="card">
                        <input type="text" id="valor_causa" class="form-control" placeholder="Valor da Causa (Ex: 1500,00)" required>
                        <textarea id="fatos" class="form-control" rows="4" placeholder="Breve resumo dos fatos..." style="margin-top:10px;"></textarea>
                        <button type="submit" class="btn btn-primary" style="margin-top:15px;">Protocolar Agora</button>
                    </div>
                </form>
            </div>

            <div id="view-detalhes" class="view">
                <h2 id="det-titulo">Processo</h2>
                <div class="tab-menu">
                    <span class="tab-link active" onclick="switchTab('tab-dados', this)">Dados</span>
                    <span class="tab-link" onclick="switchTab('tab-docs', this)">Documentos</span>
                </div>

                <div id="tab-dados" class="tab-content">
                    <form id="editar-processo-form">
                        <div class="card">
                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                                <div><label class="form-label">Requerente</label><input type="text" id="edit_req_nome" class="form-control"></div>
                                <div><label class="form-label">CPF/CNPJ</label><input type="text" id="edit_req_doc" class="form-control"></div>
                            </div>
                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:15px;">
                                <div><label class="form-label">Requerido</label><input type="text" id="edit_def_nome" class="form-control"></div>
                                <div><label class="form-label">CPF/CNPJ</label><input type="text" id="edit_def_doc" class="form-control"></div>
                            </div>
                            <div style="margin-top:15px;">
                                <label class="form-label">Valor Causa (R$)</label>
                                <input type="number" step="0.01" id="edit_valor_causa" class="form-control">
                            </div>
                            <button type="submit" class="btn btn-success" style="margin-top:20px;">Salvar Alterações</button>
                        </div>
                    </form>
                </div>

                <div id="tab-docs" class="tab-content" style="display:none;">
                    <div class="card">
                        <button class="btn btn-primary" onclick="gerarDocumento('capa')">Gerar Capa do Processo</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-preview">
        <div class="modal-content">
            <div class="modal-body" id="pdf-area"></div>
            <div style="padding:20px; text-align:right; border-top:1px solid #eee;">
                <button class="btn btn-secondary" onclick="document.getElementById('modal-preview').style.display='none'">Fechar</button>
                <button class="btn btn-primary" onclick="baixarPDF()">Baixar PDF</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/+esm';
        const supabase = createClient('https://tsgbvhfdceyjbyfstjol.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzZ2J2aGZkY2V5amJ5ZnN0am9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjY3MDEsImV4cCI6MjA5MDA0MjcwMX0.ucDetUUuVKyycACaNtzArQ8YpgybrRpQqYljYYiTgyI');

        let activeProcess = null;
        let db_procs = [];

        window.showToast = (msg) => {
            const t = document.getElementById('toast'); t.innerText = msg;
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
        };

        window.showView = (id) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            if(id === 'dash') carregarProcessos();
        };

        window.switchTab = (id, el) => {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            el.classList.add('active');
        };

        const carregarProcessos = async () => {
            const { data } = await supabase.from('processos').select('*').order('created_at', {ascending: false});
            db_procs = data || [];
            document.getElementById('lista-processos').innerHTML = db_procs.map(p => `
                <tr>
                    <td><strong>${p.numero_processo}</strong></td>
                    <td>${p.requerente_nome}</td>
                    <td>${p.requerido_nome}</td>
                    <td><span class="badge badge-status">${p.status}</span></td>
                    <td><button class="btn btn-primary" onclick="abrirProcesso('${p.id}')">Ver</button></td>
                </tr>
            `).join('');
        };

        window.abrirProcesso = (id) => {
            activeProcess = db_procs.find(p => p.id === id);
            document.getElementById('det-titulo').innerText = 'Processo ' + activeProcess.numero_processo;
            document.getElementById('edit_req_nome').value = activeProcess.requerente_nome;
            document.getElementById('edit_req_doc').value = activeProcess.requerente_documento;
            document.getElementById('edit_def_nome').value = activeProcess.requerido_nome;
            document.getElementById('edit_def_doc').value = activeProcess.requerido_documento;
            document.getElementById('edit_valor_causa').value = activeProcess.valor_causa;
            showView('detalhes');
        };

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const { error } = await supabase.auth.signInWithPassword({ email: e.target.email.value, password: e.target.password.value });
            if (error) alert("Erro: " + error.message);
            else { document.getElementById('module-auth').classList.remove('active'); document.getElementById('module-app').classList.add('active'); carregarProcessos(); }
        };

        document.getElementById('processo-form').onsubmit = async (e) => {
            e.preventDefault();
            const num = new Date().getFullYear() + '-' + Math.floor(Math.random() * 90000);
            const dados = {
                numero_processo: num,
                requerente_nome: document.getElementById('req_nome').value,
                requerente_documento: document.getElementById('req_doc').value.replace(/\D/g,''),
                requerente_endereco: document.getElementById('req_end').value,
                requerido_nome: document.getElementById('def_nome').value,
                requerido_documento: document.getElementById('def_doc').value.replace(/\D/g,''),
                requerido_endereco: document.getElementById('def_end').value,
                valor_causa: parseFloat(document.getElementById('valor_causa').value.replace(',','.')),
                resumo_fatos: document.getElementById('fatos').value,
                status: 'Protocolado'
            };
            const { error } = await supabase.from('processos').insert([dados]);
            if(error) alert(error.message);
            else { showToast("Protocolado com sucesso!"); e.target.reset(); showView('dash'); }
        };

        document.getElementById('editar-processo-form').onsubmit = async (e) => {
            e.preventDefault();
            const upd = {
                requerente_nome: document.getElementById('edit_req_nome').value,
                requerente_documento: document.getElementById('edit_req_doc').value,
                requerido_nome: document.getElementById('edit_def_nome').value,
                requerido_documento: document.getElementById('edit_def_doc').value,
                valor_causa: parseFloat(document.getElementById('edit_valor_causa').value)
            };
            const { error } = await supabase.from('processos').update(upd).eq('id', activeProcess.id);
            if(error) alert("Erro ao salvar: " + error.message);
            else { showToast("Alterações salvas!"); carregarProcessos(); }
        };

        window.gerarDocumento = (tipo) => {
            let html = `<div class="pdf-page" style="text-align:center; border: 2px solid #000; padding: 50px;">
                <h1>CAPA DO PROCESSO</h1>
                <h2 style="margin-top:50px;">Nº ${activeProcess.numero_processo}</h2>
                <div style="text-align:left; margin-top:100px; font-size:18px;">
                    <p><strong>REQUERENTE:</strong> ${activeProcess.requerente_nome}</p>
                    <p><strong>REQUERIDO:</strong> ${activeProcess.requerido_nome}</p>
                    <p><strong>VALOR:</strong> R$ ${activeProcess.valor_causa.toLocaleString('pt-BR')}</p>
                </div>
            </div>`;
            document.getElementById('pdf-area').innerHTML = html;
            document.getElementById('modal-preview').style.display = 'flex';
        };

        window.baixarPDF = () => {
            const element = document.getElementById('pdf-area');
            html2pdf().from(element).save(`Processo_${activeProcess.numero_processo}.pdf`);
        };

    </script>
</body>
</html>
