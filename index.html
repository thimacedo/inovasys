<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inovaSys - Gestão Arbitral</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --color-primary: #0a192f;
            --color-accent: #0284c7;
            --color-bg: #f8fafc;
            --sidebar-width: 260px;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--color-bg); margin: 0; display: flex; min-height: 100vh; }
        .module { display: none; width: 100%; height: 100vh; justify-content: center; align-items: center; }
        .module.active { display: flex; }
        
        #module-app { justify-content: flex-start; align-items: stretch; }
        .sidebar { width: var(--sidebar-width); background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .main { flex: 1; padding: 40px; }

        .auth-card { background: white; padding: 40px; border-radius: 12px; width: 100%; max-width: 380px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); text-align: center; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; }
        .btn { padding: 12px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; width: 100%; background: var(--color-accent); color: white; }
        
        #debug-console { 
            background: #1a1a1a; color: #00ff00; font-family: monospace; font-size: 11px; 
            padding: 10px; margin-top: 20px; border-radius: 4px; text-align: left; 
            max-height: 100px; overflow-y: auto; display: none;
        }
        .error-alert { background: #fee2e2; color: #b91c1c; padding: 10px; border-radius: 6px; margin-bottom: 15px; display: none; font-size: 13px; }
    </style>
</head>
<body>

    <div id="module-auth" class="module active">
        <div class="auth-card">
            <img src="https://inovasysrn.vercel.app/logo-inovasys.png" alt="inovaSys" style="max-width: 150px; margin-bottom: 20px;">
            <div id="login-error" class="error-alert"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <input type="email" id="email" class="form-control" placeholder="E-mail" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" class="form-control" placeholder="Senha" required>
                </div>
                <button type="submit" id="btn-login" class="btn">Entrar</button>
            </form>

            <div id="debug-console">Iniciando diagnóstico...</div>
        </div>
    </div>

    <div id="module-app" class="module">
        <nav class="sidebar">
            <div style="padding: 20px; font-weight: bold; border-bottom: 1px solid #eee;">inovaSys</div>
            <div style="padding: 20px; cursor: pointer;" onclick="location.reload()">Sair</div>
        </nav>
        <main class="main">
            <h2>Painel de Processos</h2>
            <div id="lista-container">Carregando dados...</div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://tsgbvhfdceyjbyfstjol.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzZ2J2aGZkY2V5amJ5ZnN0am9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjY3MDEsImV4cCI6MjA5MDA0MjcwMX0.ucDetUUuVKyycACaNtzArQ8YpgybrRpQqYljYYiTgyI';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const debug = (msg) => {
            const d = document.getElementById('debug-console');
            d.style.display = 'block';
            d.innerHTML += `<br>> ${msg}`;
            console.log(msg);
        };

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const errBox = document.getElementById('login-error');
            
            btn.innerText = "Processando...";
            btn.disabled = true;
            errBox.style.display = 'none';
            debug("Tentando autenticação...");

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: e.target.email.value,
                    password: e.target.password.value
                });

                if (error) {
                    debug("Erro retornado pelo Supabase: " + error.message);
                    errBox.innerText = "Falha: " + error.message;
                    errBox.style.display = 'block';
                    btn.innerText = "Entrar";
                    btn.disabled = false;
                } else {
                    debug("Sucesso! Token gerado. Redirecionando...");
                    document.getElementById('module-auth').classList.remove('active');
                    document.getElementById('module-app').classList.add('active');
                    loadData();
                }
            } catch (err) {
                debug("Erro crítico de JS: " + err.message);
                btn.disabled = false;
            }
        };

        async function loadData() {
            debug("Buscando processos...");
            const { data, error } = await supabase.from('processos').select('*');
            
            if (error) {
                debug("Erro de Tabela: " + error.message);
                document.getElementById('lista-container').innerHTML = "Erro ao ler tabela: " + error.message;
            } else {
                debug(`Encontrado(s) ${data.length} registro(s).`);
                document.getElementById('lista-container').innerHTML = data.length > 0 
                    ? JSON.stringify(data) 
                    : "Nenhum processo cadastrado.";
            }
        }
    </script>
</body>
</html>
