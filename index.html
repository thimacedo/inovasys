<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inovaSys - Gestão Arbitral</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --color-primary: #0a192f;
            --color-accent: #0284c7;
            --color-bg: #f8fafc;
            --color-surface: #ffffff;
            --color-text: #334155;
            --color-border: #e2e8f0;
            --sidebar-width: 260px;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--color-bg); color: var(--color-text); margin: 0; display: flex; min-height: 100vh; }
        .module { display: none; width: 100%; }
        .module.active { display: flex; }
        .view { display: none; }
        .view.active { display: block; }

        /* Login Card */
        #module-auth { height: 100vh; justify-content: center; align-items: center; background: var(--color-primary); width: 100%; }
        .auth-card { background: white; padding: 40px; border-radius: 12px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
        .auth-card img { max-width: 160px; margin-bottom: 25px; }
        .auth-view { display: none; }
        .auth-view.active { display: block; }

        /* Sidebar & Layout */
        .sidebar { width: var(--sidebar-width); background: white; border-right: 1px solid var(--color-border); position: fixed; height: 100vh; display: flex; flex-direction: column; }
        .sidebar-brand { padding: 25px; text-align: center; border-bottom: 1px solid var(--color-border); }
        .sidebar-brand img { max-width: 130px; }
        .nav-item { padding: 15px 25px; cursor: pointer; font-size: 14px; font-weight: 500; color: #64748b; border-left: 4px solid transparent; }
        .nav-item.active { background: #f1f5f9; color: var(--color-accent); border-left-color: var(--color-accent); }
        .main { flex: 1; margin-left: var(--sidebar-width); padding: 40px; }

        /* UI Elements */
        .card { background: white; border-radius: 8px; border: 1px solid var(--color-border); padding: 25px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; font-size: 11px; text-transform: uppercase; color: #64748b; background: #f8fafc; }
        td { padding: 12px; border-top: 1px solid var(--color-border); font-size: 14px; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; color: var(--color-primary); }
        .form-control { width: 100%; padding: 12px; border: 1px solid var(--color-border); border-radius: 6px; font-family: inherit; box-sizing: border-box; }
        .btn { padding: 12px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; width: 100%; }
        .btn-primary { background: var(--color-accent); color: white; margin-top: 10px; }
        .btn-link { background: none; color: var(--color-accent); font-size: 13px; margin-top: 15px; text-decoration: underline; padding: 0; width: auto; }
    </style>
</head>
<body>

    <div id="module-auth" class="module active">
        <div class="auth-card">
            <img src="logo-inovasys.png" alt="inovaSys">
            
            <div id="view-login" class="auth-view active">
                <form id="login-form">
                    <div class="form-group"><label class="form-label">E-mail</label><input type="email" id="email" class="form-control" required></div>
                    <div class="form-group"><label class="form-label">Senha</label><input type="password" id="password" class="form-control" required></div>
                    <button type="submit" id="btn-login" class="btn btn-primary">Entrar no Sistema</button>
                </form>
                <button type="button" class="btn btn-link" onclick="switchAuthView('view-forgot')">Esqueci minha senha</button>
            </div>

            <div id="view-forgot" class="auth-view">
                <h3 style="margin-top:0; color: var(--color-primary);">Recuperar Acesso</h3>
                <p style="font-size: 13px; color: #64748b; margin-bottom: 20px;">Enviaremos um link de recuperação para o seu e-mail.</p>
                <form id="forgot-form">
                    <div class="form-group"><label class="form-label">E-mail Cadastrado</label><input type="email" id="forgot-email" class="form-control" required></div>
                    <button type="submit" id="btn-forgot" class="btn btn-primary">Enviar Link</button>
                </form>
                <button type="button" class="btn btn-link" onclick="switchAuthView('view-login')">Voltar ao login</button>
            </div>

            <div id="view-new-password" class="auth-view">
                <h3 style="margin-top:0; color: var(--color-primary);">Definir Nova Senha</h3>
                <form id="new-password-form">
                    <div class="form-group"><label class="form-label">Nova Senha</label><input type="password" id="new-pwd" class="form-control" minlength="6" required></div>
                    <button type="submit" id="btn-new-pwd" class="btn btn-primary">Salvar Nova Senha</button>
                </form>
            </div>
        </div>
    </div>

    <div id="module-app" class="module">
        <nav class="sidebar">
            <div class="sidebar-brand"><img src="logo-inovasys.png" alt="inovaSys"></div>
            <div class="nav-item active" onclick="showView('dash')">Processos</div>
            <div class="nav-item" onclick="showView('novo')">Novo Protocolo</div>
            <div class="nav-item" onclick="logout()" style="margin-top:auto; color: #ef4444;">Sair do Sistema</div>
        </nav>
        <main class="main">
            <div id="view-dash" class="view active">
                <h2 style="color: var(--color-primary);">Processos Arbitrais</h2>
                <div class="card">
                    <table>
                        <thead><tr><th>Nº do Processo</th><th>Requerido</th><th>Status</th></tr></thead>
                        <tbody id="lista-processos"></tbody>
                    </table>
                </div>
            </div>
            <div id="view-novo" class="view">
                <h2 style="color: var(--color-primary);">Novo Protocolo</h2>
                <div class="card">
                    <form id="processo-form">
                        <div class="form-group"><label class="form-label">Nome do Requerente</label><input type="text" id="req_nome" class="form-control" required></div>
                        <div class="form-group"><label class="form-label">Nome do Requerido</label><input type="text" id="def_nome" class="form-control" required></div>
                        <div class="form-group"><label class="form-label">Resumo dos Fatos</label><textarea id="fatos" class="form-control" rows="4"></textarea></div>
                        <button type="submit" id="btn-protocolar" class="btn btn-primary" style="width: auto;">Cadastrar Processo</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://tsgbvhfdceyjbyfstjol.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzZ2J2aGZkY2V5amJ5ZnN0am9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjY3MDEsImV4cCI6MjA5MDA0MjcwMX0.ucDetUUuVKyycACaNtzArQ8YpgybrRpQqYljYYiTgyI'; 
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function switchAuthView(viewId) {
            document.querySelectorAll('.auth-view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        function showView(v) { 
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active')); 
            document.getElementById('view-'+v).classList.add('active'); 
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(event && event.currentTarget) event.currentTarget.classList.add('active');
        }

        // Login
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            btn.innerText = "Autenticando...";
            btn.disabled = true;

            const { error } = await supabase.auth.signInWithPassword({
                email: e.target.email.value, 
                password: e.target.password.value
            });

            if (error) {
                alert("Erro ao entrar: " + error.message);
                btn.innerText = "Entrar no Sistema";
                btn.disabled = false;
            } else {
                loadData();
            }
        };

        // Esqueci Senha
        document.getElementById('forgot-form').onsubmit = async (e) => {
            e.preventDefault();
            const { error } = await supabase.auth.resetPasswordForEmail(e.target['forgot-email'].value, {
                redirectTo: window.location.origin
            });
            if (error) alert(error.message); else alert("Verifique seu e-mail para o link!");
        };

        // Salvar Nova Senha
        document.getElementById('new-password-form').onsubmit = async (e) => {
            e.preventDefault();
            const { error } = await supabase.auth.updateUser({ password: e.target['new-pwd'].value });
            if (error) alert(error.message); 
            else { alert("Senha alterada!"); location.reload(); }
        };

        // Monitorar evento de recuperação
        supabase.auth.onAuthStateChange((event) => {
            if (event === "PASSWORD_RECOVERY") switchAuthView('view-new-password');
        });

        async function logout() { await supabase.auth.signOut(); location.reload(); }

        async function loadData() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) return;
            
            document.getElementById('module-auth').classList.remove('active');
            document.getElementById('module-app').classList.add('active');
            
            const { data } = await supabase.from('processos').select('*');
            if (data) {
                document.getElementById('lista-processos').innerHTML = data.map(p => `
                    <tr>
                        <td><strong>${p.numero_processo}</strong></td>
                        <td>${p.requerido_nome}</td>
                        <td><span style="background:#e0f2fe; color:#0369a1; padding:4px 8px; border-radius:4px; font-size:12px;">${p.status}</span></td>
                    </tr>`).join('');
            }
        }

        document.getElementById('processo-form').onsubmit = async (e) => {
            e.preventDefault();
            const { data: { user } } = await supabase.auth.getUser();
            const payload = {
                numero_processo: `${new Date().getFullYear()}.AR.${Math.floor(Math.random()*9000 + 1000)}`,
                requerente_nome: document.getElementById('req_nome').value,
                requerido_nome: document.getElementById('def_nome').value,
                resumo_fatos: document.getElementById('fatos').value,
                user_id: user.id
            };
            const { error } = await supabase.from('processos').insert([payload]);
            if (error) alert(error.message); else { alert('Sucesso!'); showView('dash'); loadData(); }
        };

        loadData();
    </script>
</body>
</html>
