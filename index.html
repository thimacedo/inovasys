<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inovaSys - Gestão Arbitral</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --color-primary: #0a192f;
            --color-accent: #0284c7;
            --color-bg: #f8fafc;
            --color-surface: #ffffff;
            --color-text: #334155;
            --color-border: #e2e8f0;
            --sidebar-width: 260px;
            --radius-md: 8px;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--color-bg); color: var(--color-text); margin: 0; display: flex; min-height: 100vh; }
        .module { display: none; width: 100%; }
        .module.active { display: flex; }
        .view { display: none; }
        .view.active { display: block; }

        /* Login */
        #module-auth { height: 100vh; justify-content: center; align-items: center; background: var(--color-primary); }
        .auth-card { background: white; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; }

        /* Sidebar & Layout */
        .sidebar { width: var(--sidebar-width); background: white; border-right: 1px solid var(--color-border); position: fixed; height: 100vh; display: flex; flex-direction: column; }
        .nav-item { padding: 15px 25px; cursor: pointer; font-size: 14px; font-weight: 500; color: #64748b; border-left: 4px solid transparent; }
        .nav-item.active { background: #f1f5f9; color: var(--color-accent); border-left-color: var(--color-accent); }
        .main { flex: 1; margin-left: var(--sidebar-width); padding: 40px; }

        /* Cards e Tabelas */
        .card { background: white; border-radius: 8px; border: 1px solid var(--color-border); padding: 25px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; font-size: 12px; color: #64748b; background: #f8fafc; }
        td { padding: 12px; border-top: 1px solid var(--color-border); font-size: 14px; }

        /* Forms */
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; }
        .form-control { width: 100%; padding: 10px; border: 1px solid var(--color-border); border-radius: 6px; box-sizing: border-box; }
        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
        .btn-primary { background: var(--color-accent); color: white; width: 100%; }
        
        #hidden-pdf { display: none; }
    </style>
</head>
<body>

    <div id="module-auth" class="module active">
        <div class="auth-card">
            <h2 style="margin-top:0">inovaSys</h2>
            <form id="login-form">
                <div class="form-group"><label class="form-label">E-mail</label><input type="email" id="email" class="form-control" required></div>
                <div class="form-group"><label class="form-label">Senha</label><input type="password" id="password" class="form-control" required></div>
                <button type="submit" class="btn btn-primary">Entrar no Sistema</button>
            </form>
        </div>
    </div>

    <div id="module-app" class="module">
        <nav class="sidebar">
            <div style="padding:30px; font-weight:bold; color:var(--color-primary)">INOVASYS ARBITRAGEM</div>
            <div class="nav-item active" onclick="showView('dash')">Painel Principal</div>
            <div class="nav-item" onclick="showView('novo')">Novo Procedimento</div>
            <div class="nav-item" onclick="logout()" style="margin-top:auto; color:red">Sair</div>
        </nav>

        <main class="main">
            <div id="view-dash" class="view active">
                <h2>Meus Processos</h2>
                <div class="card">
                    <table>
                        <thead>
                            <tr><th>Nº PROCESSO</th><th>REQUERIDO</th><th>STATUS</th><th>AÇÕES</th></tr>
                        </thead>
                        <tbody id="lista-processos"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-novo" class="view">
                <h2>Iniciar Arbitragem</h2>
                <div class="card">
                    <form id="processo-form">
                        <div class="form-group"><label class="form-label">Nome do Requerente</label><input type="text" id="req_nome" class="form-control" required></div>
                        <div class="form-group"><label class="form-label">CPF/CNPJ Requerente</label><input type="text" id="req_doc" class="form-control" required></div>
                        <div class="form-group"><label class="form-label">Nome do Requerido</label><input type="text" id="def_nome" class="form-control" required></div>
                        <div class="form-group"><label class="form-label">Valor da Causa (R$)</label><input type="number" id="valor" class="form-control" required></div>
                        <div class="form-group"><label class="form-label">Breve relato dos fatos</label><textarea id="fatos" class="form-control" rows="4"></textarea></div>
                        <button type="submit" class="btn btn-primary" style="width:auto">Protocolar Pedido</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        // CONFIGURAÇÃO SUPABASE
        const SUPABASE_URL = 'SUA_URL_AQUI';
        const SUPABASE_KEY = 'SUA_KEY_ANON_AQUI';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // NAVEGAÇÃO
        function showView(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
        }

        // LOGIN
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const { data, error } = await supabase.auth.signInWithPassword({
                email: e.target.email.value,
                password: e.target.password.value
            });
            if (error) alert(error.message);
            else location.reload();
        };

        async function logout() { await supabase.auth.signOut(); location.reload(); }

        // CARREGAR DADOS
        async function loadData() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return;

            document.getElementById('module-auth').classList.remove('active');
            document.getElementById('module-app').classList.add('active');

            const { data: processos } = await supabase.from('processos').select('*');
            const lista = document.getElementById('lista-processos');
            lista.innerHTML = processos.map(p => `
                <tr>
                    <td><b>${p.numero_processo}</b></td>
                    <td>${p.requerido_nome}</td>
                    <td>${p.status}</td>
                    <td><button onclick="alert('Gerando PDF...')">Capa PDF</button></td>
                </tr>
            `).join('');
        }

        // SALVAR PROCESSO
        document.getElementById('processo-form').onsubmit = async (e) => {
            e.preventDefault();
            const { data: { user } } = await supabase.auth.getUser();
            
            const payload = {
                numero_processo: `2026.AR.${Math.floor(Math.random() * 9000 + 1000)}`,
                requerente_nome: document.getElementById('req_nome').value,
                requerente_doc: document.getElementById('req_doc').value,
                requerido_nome: document.getElementById('def_nome').value,
                valor_causa: document.getElementById('valor').value,
                resumo_fatos: document.getElementById('fatos').value,
                user_id: user.id
            };

            const { error } = await supabase.from('processos').insert([payload]);
            if (error) alert(error.message);
            else { alert('Processo Autuado!'); location.reload(); }
        };

        loadData();
    </script>
</body>
</html>
